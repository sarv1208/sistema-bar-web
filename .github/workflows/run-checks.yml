name: Run Vue checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1"

    - name: Install dependencies
      run: bun install

    - name: Run type checks
      run: bun run type-check

    - name: Run ESLint
      run: bun run lint

    - name: Run tests
      run: bun run test
